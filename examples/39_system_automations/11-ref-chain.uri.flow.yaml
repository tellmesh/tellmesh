flow:
  id: ref-chain-smoke
  description: save_as + ${ref} instead of implicit latest coupling

defaults:
  approved: true
  dry_run: true

do:
  - id: screenshot
    uri: kvm://local/monitor/primary/query/screenshot
    save_as: screenshot
  - id: ocr
    uri: ocr://local/image/${screenshot.result.image_id}/query/text
    after: screenshot
