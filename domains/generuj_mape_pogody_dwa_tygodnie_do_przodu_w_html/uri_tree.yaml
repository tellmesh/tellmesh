domain:
  id: generuj_mape_pogody_dwa_tygodnie_do_przodu_w_html
  uri: domain://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html
  name: generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html
  description: generuj mape pogody dwa tygodnie do przodu w html
standards:
  uri_tree_schema: schemas/uri_tree.schema.json
  data_contract: protobuf
  agent_manifest: a2a_agent_card
  resource_model: mcp_resources
inputs:
  input:
    uri: input://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html/input
    type: string
    required: true
commands:
  run:
    uri: command://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html/run
    name: RunTask
    handler_uri: python://domains.generuj_mape_pogody_dwa_tygodnie_do_przodu_w_html.handlers.run:handler
    input_schema_ref: app.generuj_mape_pogody_dwa_tygodnie_do_przodu_w_html.v1.RunTaskCommand
    emits:
    - event://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html/TaskRequested
    - event://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html/TaskCompleted
events:
  requested:
    uri: event://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html/TaskRequested
    name: TaskRequested
    schema_ref: app.generuj_mape_pogody_dwa_tygodnie_do_przodu_w_html.v1.TaskRequested
  completed:
    uri: event://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html/TaskCompleted
    name: TaskCompleted
    schema_ref: app.generuj_mape_pogody_dwa_tygodnie_do_przodu_w_html.v1.TaskCompleted
resources:
  result:
    uri_template: resource://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html/result/{id}
    schema_ref: app.generuj_mape_pogody_dwa_tygodnie_do_przodu_w_html.v1.TaskResultView
    renderer_ref: json
    mime_type: application/json
artifacts: {}
agent:
  id: generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html-agent
  uri: agent://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html-agent
  name: generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html-agent
  card_uri: a2a://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html-agent/.well-known/agent-card.json
  capabilities:
  - name: run
    type: command
    uri: a2a://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html-agent/skills/run
deployment:
  default:
    uri: local://agents/generated/generuj_mape_pogody_dwa_tygodnie_do_przodu_w_html_agent
mcp:
  resources_read:
    uri: mcp://generuj-mape-pogody-dwa-tygodnie-do-przodu-w-html-agent/resources/read
dependencies:
- pypi://pydantic
