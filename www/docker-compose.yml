services:
  www-chat:
    build:
      context: ../../..
      dockerfile: tellmesh/tellmesh/www/Dockerfile
    image: hypervisor-www-chat:latest
    container_name: hypervisor-www-chat
    network_mode: "host"
    pid: "host"
    volumes:
      - ${HYPERVISOR_WWW_DIR:-../../www}:/app/www:ro
      - ../../hypervisor:/app/tellmesh/hypervisor:ro
      - ../../resource-agent-hypervisor:/app/tellmesh/resource-agent-hypervisor:ro
      - ../../resource-agent-factory:/app/tellmesh/resource-agent-factory:ro
      - ../../hypervisor-dashboard:/app/tellmesh/hypervisor-dashboard:ro
      - ../agents/generated:/app/agents/generated
      - ../config:/app/config:ro
      - ../contracts:/app/contracts
      - ../deployments:/app/deployments
      - ../domains:/app/domains:ro
      - ../examples:/app/examples:ro
      - ../knowledge:/app/knowledge:ro
      - ../schemas:/app/schemas:ro
      - ../output:/app/output
    restart: unless-stopped
