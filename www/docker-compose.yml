services:
  www-chat:
    build:
      context: ..
      dockerfile: www/Dockerfile
    image: hypervisor-www-chat:latest
    container_name: hypervisor-www-chat
    ports:
      - "${WWW_PORT:-8788}:8788"
    volumes:
      - ../www:/app/www:ro
      - ../agents/generated:/app/agents/generated:ro
      - ../config:/app/config:ro
      - ../contracts:/app/contracts:ro
      - ../deployments:/app/deployments:ro
      - ../domains:/app/domains:ro
      - ../knowledge:/app/knowledge:ro
      - ../schemas:/app/schemas:ro
      - ../output:/app/output
    restart: unless-stopped
