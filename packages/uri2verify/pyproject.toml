[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "uri2verify"
version = "0.1.0"
description = "Verification layer — data quality gates, workflow replay, regression tests."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["pyyaml>=6.0"]

[project.scripts]
uri2verify = "uri2verify.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["uri2verify*"]
