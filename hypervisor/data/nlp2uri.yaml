# nlp2uri.yaml — default desktop URI compiler configuration (embedded in hypervisor)
# platform: auto | linux | darwin | windows (auto = detect at runtime)

platform: auto
host_platform: linux
locale: null
dry_run: false
capture_dir: /tmp/nlp2uri-captures

# Hypervisor-specific extensions
hypervisor:
  log_level: INFO
  max_agents: 8
  default_profile: normal
  enable_event_sourcing: true
