version: 1

schemes:
  robot:
    operations:
      state:
        kind: query
        handler: python://agents.operators.device_robot_operator.adapters.physical_mock:robot_state
        output_schema: operator.robot.v1.RobotState
        side_effects: false
        produces_artifact: true
        adapters: [mock]

      move:
        kind: command
        handler: python://agents.operators.device_robot_operator.adapters.physical_mock:robot_move
        input_schema: operator.robot.v1.RobotMoveCommand
        output_schema: operator.common.v1.OperationResult
        side_effects: true
        requires_policy: true
        adapters: [mock]

      stop:
        kind: command
        handler: python://agents.operators.device_robot_operator.adapters.physical_mock:robot_stop
        input_schema: operator.robot.v1.RobotStopCommand
        output_schema: operator.common.v1.OperationResult
        side_effects: true
        requires_policy: true
        adapters: [mock]

      mission_start:
        kind: command
        handler: python://agents.operators.device_robot_operator.adapters.physical_mock:robot_mission_start
        input_schema: operator.robot.v1.RobotMissionStartCommand
        output_schema: operator.common.v1.OperationResult
        side_effects: true
        requires_policy: true
        adapters: [mock]

  device:
    operations:
      status:
        kind: query
        handler: python://agents.operators.device_robot_operator.adapters.physical_mock:device_status
        output_schema: operator.device.v1.DeviceStatus
        side_effects: false
        produces_artifact: true
        adapters: [mock]

      read:
        kind: query
        handler: python://agents.operators.device_robot_operator.adapters.physical_mock:device_read
        input_schema: operator.device.v1.DeviceReadCommand
        output_schema: operator.device.v1.DeviceReading
        side_effects: false
        produces_artifact: true
        adapters: [mock]

      write:
        kind: command
        handler: python://agents.operators.device_robot_operator.adapters.physical_mock:device_write
        input_schema: operator.device.v1.DeviceWriteCommand
        output_schema: operator.common.v1.OperationResult
        side_effects: true
        requires_policy: true
        adapters: [mock]

  assertion:
    operations:
      check:
        kind: query
        handler: python://agents.operators.common.assertion:check
        output_schema: operator.common.v1.OperationResult
        side_effects: false
        requires_policy: false
        adapters: [builtin]
