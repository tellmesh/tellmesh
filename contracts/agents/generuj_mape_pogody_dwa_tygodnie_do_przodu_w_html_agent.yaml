  python_package: generuj_mape_pogody_dwa_tygodnie_do_przodu_w_html_agent
  version: 0.1.0
  description: generuj mape pogody dwa tygodnie do przodu w html
  runtime_url_env: RESOURCE_RUNTIME_URL
