# Import boundary rules for architecture tests (tests/architecture/).

packages:
  uri2flow:
    root: ../../tellmesh/uri2flow/uri2flow
    forbidden:
      - hypervisor
      - uri3.graph.graph_executor
      - touri.executor

  uri2verify:
    root: ../../tellmesh/uri2verify/uri2verify
    forbidden:
      - nl2uri
      - uri2ops.server
      - hypervisor.deployment_registry
    allowed_import_prefixes:
      - hypervisor.contract_registry

  touri:
    root: ../../tellmesh/touri/touri
    forbidden:
      - hypervisor
    allowed_import_prefixes:
      - uri2run

  uri2run:
    root: ../../tellmesh/uri2run/uri2run
    forbidden:
      - hypervisor
      - nl2uri
      - uri2verify
      - touri

  uri2voice:
    root: ../../tellmesh/uri2voice/uri2voice
    forbidden:
      - uri3.graph
      - hypervisor

  uri2pact:
    root: ../../tellmesh/uri2pact/uri2pact
    forbidden:
      - hypervisor
      - touri.executor

  urigen:
    root: ../../tellmesh/urigen/urigen
    forbidden:
      - uri2run.transports
      - uri2ops.server
      - hypervisor.deployment_registry.process

  uri3:
    root: ../../tellmesh/uri3/uri3
    forbidden:
      - playwright
    allowed_import_prefixes:
      - uri2run
    allowed_path_prefixes:
      - graph/adapters/browser_

  nl2uri:
    root: ../../tellmesh/nl2uri/nl2uri
    forbidden:
      - uri3.graph.graph_executor
      - touri.executor
